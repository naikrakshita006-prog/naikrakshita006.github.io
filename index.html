<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Kindness Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>🌿 Daily Kindness Tracker</h1>
        <p class="subtitle">One small act can change the world.</p>

        <form>
            <input type="text" placeholder="What kind thing did you do today?" required>
            <button type="submit">Add</button>
        </form>

        <div class="cards">
            <div class="card">Helped a colleague with their work 💼</div>
            <div class="card">Called a friend to check in 📞</div>
            <div class="card">Fed a stray animal 🐶</div>
        </div>
    </div>

</body>
</html>
